name: Opifex CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-suffix: "lint"

      - name: Set up Python
        run: uv python install 3.12

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Run Ruff linter
        run: uv run ruff check --output-format=github

      - name: Run Ruff formatter check
        run: uv run ruff format --check

  test:
    name: Unit Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ${{ matrix.os }}
    # Fast PR gate: parallelised across cores, slow/integration suites run in
    # tests-extended.yml. ~7.5k JAX tests take ~95m on the macOS M1 runners and
    # ~170m on the slower 4-core ubuntu runners; cap well above both (and below
    # the 6h job ceiling). A per-test --timeout=1800 (raised from the default 300
    # below) bounds hangs while tolerating heavy tests slowed by xdist contention.
    timeout-minutes: 240
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-suffix: "test-${{ matrix.os }}-${{ matrix.python-version }}"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      - name: Ensure ripgrep is available
        # A few migration-guard tests shell out to `rg`; ubuntu images ship it,
        # macOS images do not.
        run: |
          command -v rg >/dev/null 2>&1 || {
            if [ "$RUNNER_OS" = "macOS" ]; then brew install ripgrep; \
            else sudo apt-get update && sudo apt-get install -y ripgrep; fi
          }

      - name: Run tests
        env:
          JAX_PLATFORMS: cpu
          JAX_ENABLE_X64: "0"
          # test_jax_configuration_applied imports opifex in a clean subprocess and
          # asserts jax has a compilation cache dir; set it like the dev environment.
          JAX_COMPILATION_CACHE_DIR: ${{ github.workspace }}/.cache/jax
        run: |
          uv run pytest tests/ -n auto \
            -m "not slow and not integration and not e2e and not performance and not benchmark and not distributed and not gpu_required" \
            --timeout=1800 \
            --cov=src/opifex \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
        if: always()

  coverage:
    name: Coverage Report
    needs: test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: artifacts

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: artifacts
          flags: unittests
          fail_ci_if_error: false
          use_oidc: true

  build:
    name: Build Package
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-suffix: "build"

      - name: Set up Python
        run: uv python install 3.12

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Build package
        run: uv build

      - name: Check package
        run: uv run twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: dist/
